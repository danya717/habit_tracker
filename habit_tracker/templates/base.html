{% load static %}
<!doctype html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>habit_tracker</title>
</head>
<body>
    <div class="main_page">
        <div class="top_bar">
            <p class="main_page_title">HabitTracker</p>
        </div>
        <div class="streak_bar">
            <p class="streak_title">Keep the Streak Going!</p>
            <div class="streak_text_row">
                <b class="current_streak_text">Current Streak: 12</b>
                <b class="best_streak_text">Best Streak: 24</b>
                <p class="total_habits_text">Total Habits Completed: 184</p>
            </div>
        </div>
        <div class="week_days_bar">
            <div class="week_days_letters">
                <b>M</b>
                <b>T</b>
                <b>W</b>
                <b>T</b>
                <b>F</b>
                <b>S</b>
                <b>S</b>
            </div>
        </div>
        <div class="tasks">
            <div class="task1">
                <b class="tasks_title">Drink Water</b>
            </div>
            <div class="task2">
                <b class="tasks_title">Workout</b>
            </div>
            <div class="task3">
                <b class="tasks_title">Read 20 Minutes</b>
            </div>
            <div class="task4">
                <b class="tasks_title">No sugar</b>
            </div>
        </div>
    </div>
</body>
</html>
