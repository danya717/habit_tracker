{% load static %}
<!doctype html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
    <div class="main_page">
        <div class="menu">
            <p class="main_page_title">{% block page_title %}{% endblock %}</p>
            <div class="menu_paths">
                {% for path in paths %}
                    <a class="menu_path" href="{% url path %}">{{ path }}</a>
                {% endfor %}
            </div>
        </div>

        {% block daily_momentum %}
        {% endblock %}

        {% block week_days_bar %}
        {% endblock %}

        {% block tasks %}
        {% endblock %}

        {% block all_habits %}
        {% endblock %}
    </div>
</body>
</html>
